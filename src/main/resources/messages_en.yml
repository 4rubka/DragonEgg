# DragonEgg Messages - English (en)
# Translate these messages to your language

# Prefix for all messages
prefix: "&5&l[DragonEgg] &r"

# General messages
general:
  reload: "&aConfiguration reloaded successfully!"
  no-permission: "&cYou don't have permission to do that!"
  player-not-found: "&cPlayer not found!"
  console-only: "&cThis command can only be used from console!"
  player-only: "&cThis command can only be used by players!"

# Dragon Egg messages
egg:
  obtained: "&6&lYou obtained the Dragon Egg! &7Feel its power flowing through you..."
  bonded: "&5&lThe Dragon Egg has bonded to you! &7Only you can wield its power."
  cannot-use: "&cThis Dragon Egg belongs to another player!"
  cannot-steal: "&cYou cannot steal a bonded Dragon Egg!"
  cannot-place: "&cDragon Eggs cannot be placed! &7They are meant to be held."
  placed: "&aDragon Egg placed successfully! &7Its power radiates in this area."
  broken: "&cThe Dragon Egg was broken! &7Its power has been released."
  in-range: "&aYou feel the Dragon Egg's power blessing you!"
  out-of-range: "&7You left the Dragon Egg's power range."

# Effects messages
effects:
  added: "&aAdded effect &e%effect% &alevel &e%level%&a!"
  removed: "&cRemoved effect &e%effect%&c!"
  level-set: "&aSet effect &e%effect% &ato level &e%level%&a!"
  cleared: "&cAll effects have been cleared!"
  list: "&7Active effects: &e%effects%"
  max-level: "&cEffect level cannot exceed %max%!"

# Hearts messages
hearts:
  set: "&aSet extra hearts to &e%amount%&a!"
