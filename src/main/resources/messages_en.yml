  removed: "&cRemoved &e%amount% &cextra hearts!"
  max-reached: "&cMaximum hearts cap reached!"
  current: "&7You have &e%current% &7extra hearts."
  bonus: "&6+❤️ +%amount% HP Bonus!"

# Fury messages
fury:
  activated: "&c&l⚔ DRAGON FURY ACTIVATED! ⚔&r&c"
  deactivated: "&7Dragon Fury has ended."
  cooldown: "&cDragon Fury is on cooldown! &7(%seconds%s remaining)"
  low-health: "&c&lYour health is critical! Dragon Fury available!"

# Aura messages
aura:
  applied: "&aDragon Aura is blessing nearby allies!"
  removed: "&7Dragon Aura effect ended."
  tick: "&5✨ Dragon Aura heals you for %amount% HP!"

# Shield messages
shield:
  activated: "&6&l🛡 Dragon Shield blocked the attack! 🛡"
  cooldown: "&7Dragon Shield recharging... &e(%seconds%s)"

# Revive messages
revive:
  triggered: "&6&l✨ DRAGON REVIVE! ✨&r&6"
  message: "&aThe Dragon Egg saved you from death!"
  cooldown: "&cRevive is on cooldown! &7(%hours%h %minutes%m remaining)"
